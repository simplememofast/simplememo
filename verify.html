<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
  <!-- i18n: managed by scripts/normalize_i18n_head.py -->
  <link rel="canonical" href="https://simplememofast.com/verify">
<title>Simple Memo 認証 / Verification</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; color: #1c1c1e; }
h1, h2 { font-size: 22px; margin: 16px 0; }
h2 { font-size: 18px; color: #1c1c1e; }
.code { font-size: 32px; font-weight: 600; letter-spacing: 0.2em; text-align: center; background: #f5f5f7; padding: 20px; border-radius: 12px; margin: 24px 0; font-variant-numeric: tabular-nums; }
.btn { display: block; padding: 14px 24px; border-radius: 8px; text-align: center; text-decoration: none; margin: 12px 0; font-weight: 600; }
.btn-primary { background: #007AFF; color: white; }
.btn-secondary { background: #f0f0f0; color: #007AFF; }
.lang-divider { margin: 32px 0; border-top: 1px solid #eee; }
.note { color: #666; font-size: 14px; line-height: 1.5; }
</style>
</head>
<body>
<h1>Simple Memo の認証</h1>
<div class="code" id="codeDisplay">------</div>
<p class="note">アプリを開いて、上記の6桁コードを入力してください。</p>

<a id="appLinkJa" class="btn btn-primary" href="#">アプリで開く</a>
<a class="btn btn-secondary" href="https://apps.apple.com/jp/app/id6758438948">App Store からダウンロード</a>

<div class="lang-divider"></div>

<h2>Verification</h2>
<p class="note">Open Simple Memo and enter the 6-digit code above.</p>

<a id="appLinkEn" class="btn btn-primary" href="#">Open in app</a>
<a class="btn btn-secondary" href="https://apps.apple.com/us/app/id6758438948">Download on App Store</a>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code') || '------';
  // Defensive: only digits, max 6 chars. Anything else falls back to the
  // placeholder so a crafted URL cannot inject HTML into the page.
  var safe = String(code).replace(/[^0-9]/g, '').slice(0, 6) || '------';
  document.getElementById('codeDisplay').textContent = safe;
  var here = window.location.href;
  document.getElementById('appLinkJa').setAttribute('href', here);
  document.getElementById('appLinkEn').setAttribute('href', here);
})();
</script>
</body>
</html>
