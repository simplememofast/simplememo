<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="OGP mock — default JA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06070b"/>
      <stop offset="1" stop-color="#0b0f16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#7cc4ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7cc4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7cc4ff"/>
      <stop offset="1" stop-color="#7cc4ff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Accent bar -->
  <rect x="80" y="80" width="120" height="6" rx="3" fill="url(#accentBar)"/>
  <!-- Logo placeholder (replace with real /assets/img/app-icon-256.png) -->
  <g transform="translate(80,150)">
    <rect width="96" height="96" rx="22" fill="#7cc4ff"/>
    <text x="48" y="60" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="42" fill="#06070b" text-anchor="middle" font-weight="700">M</text>
  </g>
  <!-- Brand wordmark -->
  <text x="200" y="215" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" fill="#9aa3b2" font-weight="500">Captio式シンプルメモ</text>
  <!-- Main copy -->
  <text x="80" y="340" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="92" fill="#ffffff" font-weight="700" letter-spacing="-2">自分にメール送信</text>
  <text x="80" y="425" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="56" fill="#7cc4ff" font-weight="700">書いて、送る。</text>
  <!-- Sub copy -->
  <text x="80" y="500" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="28" fill="#cbd2dd" font-weight="400">起動 0.3 秒 ・ 送信 150 ms</text>
  <!-- Footer rule -->
  <line x1="80" y1="540" x2="1120" y2="540" stroke="#1a2030" stroke-width="1"/>
  <!-- Footer -->
  <text x="80" y="580" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" fill="#6b7280" font-weight="500">simplememofast.com</text>
  <text x="1120" y="580" font-family="-apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif" font-size="22" fill="#6b7280" font-weight="500" text-anchor="end">iOS</text>
</svg>
