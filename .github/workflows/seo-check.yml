name: SEO Validation

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  seo-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SEO validation
        run: |
          EXIT_CODE=0
          node scripts/seo-check.js || EXIT_CODE=$?
          # Exit code 1 = warnings only (acceptable), 2 = errors (fail CI)
          if [ $EXIT_CODE -ge 2 ]; then exit $EXIT_CODE; fi

      # Rating / price / © / og:site_name must match data/site-constants.json
      - name: Site constants consistency
        run: node scripts/sync_constants.js --check

      # Smoke test only (--dry-run writes nothing). Note: the shallow CI
      # checkout means git-derived lastmod dates collapse to one date here;
      # real sitemap generation happens locally with full history.
      - name: Generate sitemap (dry run)
        run: python3 scripts/generate_sitemap.py --dry-run

      - name: IndexNow notification (on main push only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: node scripts/indexnow-notify.js --since 1
        continue-on-error: true
