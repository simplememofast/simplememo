  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--accent, #6ab4ff);
      margin-bottom: 1rem;
      text-shadow: 0 0 40px var(--glow, rgba(100, 180, 255, 0.15));
      background: linear-gradient(180deg, #ffffff 0%, var(--accent, #6ab4ff) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-message {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: var(--text-secondary, rgba(255, 255, 255, 0.7));
    }
    .back-home {
      display: inline-block;
      padding: 14px 32px;
      background: rgba(15, 20, 30, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 180, 255, 0.25);
      color: #fff;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.08);
    }
    .back-home:hover {
      transform: translateY(-2px);
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 8px 30px rgba(100, 180, 255, 0.12);
    }
    .back-home:focus-visible {
      outline: 2px solid var(--accent, #6ab4ff);
      outline-offset: 3px;
    }
    [data-lang] { display: none; }
    [data-lang].active { display: inline; }
    div[data-lang].active { display: block; }

    .error-links {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
    .error-links__title {
      font-size: 0.9rem;
      color: var(--text-muted, rgba(255,255,255,0.5));
      margin-bottom: 0.25rem;
    }
    .error-links__list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }
    .error-links__list a {
      display: inline-block;
      padding: 8px 18px;
      background: rgba(15, 20, 30, 0.4);
      border: 1px solid rgba(100, 160, 220, 0.12);
      border-radius: 20px;
      color: var(--accent, #6ab4ff);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .error-links__list a:hover {
      border-color: rgba(100, 180, 255, 0.3);
      background: rgba(100, 180, 255, 0.08);
    }

    @media (prefers-reduced-motion: reduce) {
      .back-home, .error-links__list a {
        transition: none;
      }
    }
  </style>
  <script src="https://analytics.ahrefs.com/analytics.js" data-key="6MwVxHQiKMs/Wl2rNBoiwQ" async></script>

        <span data-lang="en">Page Not Found</span>
      </div>
      <a href="/" class="back-home">
        <span data-lang="ja">ホームへ戻る</span>

      </a>
      <div class="error-links">
        <div class="error-links__title">
          <span data-lang="ja">人気のページ</span>
          <span data-lang="en">Popular Pages</span>

        <div class="error-links__list">
